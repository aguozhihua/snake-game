<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Cyber Snake - OpenClaw Edition</title>
    <style>
        :root {
            --primary-glow: #00f3ff;
            --secondary-glow: #bc13fe;
            --bg-color: #050510;
            --grid-line: rgba(0, 243, 255, 0.1);
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Courier New', Courier, monospace;
            color: var(--primary-glow);
            overflow: hidden;
            touch-action: none;
        }
        
        h1 {
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--primary-glow), 0 0 20px var(--primary-glow);
            font-size: 2rem;
        }

        #game-container {
            position: relative;
            padding: 4px;
            background: linear-gradient(45deg, var(--primary-glow), var(--secondary-glow));
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.3);
        }

        #game-board {
            position: relative;
            background-color: rgba(5, 5, 16, 0.9);
            border-radius: 4px;
            overflow: hidden;
        }

        .pixel {
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 4px;
            box-sizing: border-box;
            transition: left 0.1s linear, top 0.1s linear;
        }

        .snake-body {
            background-color: rgba(0, 243, 255, 0.6);
            border: 1px solid var(--primary-glow);
            box-shadow: 0 0 5px var(--primary-glow);
            z-index: 2;
        }

        .snake-head {
            background-color: #fff;
            border: 2px solid var(--primary-glow);
            box-shadow: 0 0 15px var(--primary-glow);
            z-index: 3;
            border-radius: 50%;
        }

        .food {
            background: var(--secondary-glow);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--secondary-glow), 0 0 30px var(--secondary-glow);
            z-index: 1;
            animation: pulse 0.8s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.7; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        .particle {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            animation: fadeOut 0.5s forwards;
        }

        @keyframes fadeOut {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }

        #score-board {
            margin-top: 15px;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 5px var(--secondary-glow);
        }

        #controls {
            margin-top: 20px;
            display: none; 
        }
        
        .btn {
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid var(--primary-glow);
            color: var(--primary-glow);
            padding: 15px 20px;
            border-radius: 50%;
            font-size: 20px;
            margin: 5px;
            backdrop-filter: blur(5px);
            transition: all 0.2s;
        }

        .btn:active {
            background: var(--primary-glow);
            color: #000;
            transform: scale(0.9);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        @media (max-width: 600px) {
            #controls {
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                gap: 10px;
            }
            .btn-up { grid-column: 2; }
            .btn-left { grid-column: 1; grid-row: 2; }
            .btn-down { grid-column: 2; grid-row: 2; }
            .btn-right { grid-column: 3; grid-row: 2; }
        }

        /* Scanline effect */
        body::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <h1>AI SNAKE v2.0</h1>
    <div id="game-container">
        <div id="game-board"></div>
    </div>
    <div id="score-board">SCORE: 000</div>
    
    <div id="controls">
        <div></div>
        <button class="btn btn-up" onclick="changeDirection('up')">▲</button>
        <div></div>
        <button class="btn btn-left" onclick="changeDirection('left')">◀</button>
        <button class="btn btn-down" onclick="changeDirection('down')">▼</button>
        <button class="btn btn-right" onclick="changeDirection('right')">▶</button>
    </div>

    <script>
        const BOARD_SIZE = 20;
        const PIXEL_SIZE = 20;
        const INITIAL_SPEED = 120;
        
        let snake = [{x: 10, y: 10}, {x: 10, y: 11}, {x: 10, y: 12}];
        let food = {x: 15, y: 5};
        let direction = {x: 0, y: -1}; // Start moving up
        let nextDirection = {x: 0, y: -1};
        let score = 0;
        let gameLoop;
        let isGameRunning = false;

        const board = document.getElementById('game-board');
        const scoreElement = document.getElementById('score-board');

        board.style.width = `${BOARD_SIZE * PIXEL_SIZE}px`;
        board.style.height = `${BOARD_SIZE * PIXEL_SIZE}px`;

        function createParticle(x, y, color) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            particle.style.left = `${x * PIXEL_SIZE + 10}px`;
            particle.style.top = `${y * PIXEL_SIZE + 10}px`;
            particle.style.width = '4px';
            particle.style.height = '4px';
            particle.style.backgroundColor = color;
            
            // Random explosion direction
            const angle = Math.random() * Math.PI * 2;
            const velocity = Math.random() * 30 + 10;
            const tx = Math.cos(angle) * velocity;
            const ty = Math.sin(angle) * velocity;
            
            particle.style.transition = 'all 0.5s ease-out';
            board.appendChild(particle);

            requestAnimationFrame(() => {
                particle.style.transform = `translate(${tx}px, ${ty}px) scale(0)`;
                particle.style.opacity = '0';
            });

            setTimeout(() => particle.remove(), 500);
        }

        function explosion(x, y, color) {
            for(let i=0; i<8; i++) {
                createParticle(x, y, color);
            }
        }

        function draw() {
            board.innerHTML = '';
            
            // Draw Snake
            snake.forEach((segment, index) => {
                const pixel = document.createElement('div');
                pixel.style.left = `${segment.x * PIXEL_SIZE}px`;
                pixel.style.top = `${segment.y * PIXEL_SIZE}px`;
                pixel.classList.add('pixel');
                pixel.classList.add(index === 0 ? 'snake-head' : 'snake-body');
                
                // Glow effect based on index (head is brightest)
                if (index > 0) {
                    pixel.style.opacity = Math.max(0.3, 1 - index / (snake.length + 5));
                }
                
                board.appendChild(pixel);
            });

            // Draw Food
            const foodPixel = document.createElement('div');
            foodPixel.style.left = `${food.x * PIXEL_SIZE}px`;
            foodPixel.style.top = `${food.y * PIXEL_SIZE}px`;
            foodPixel.classList.add('pixel', 'food');
            board.appendChild(foodPixel);
        }

        function update() {
            if (!isGameRunning) return;

            direction = nextDirection;
            const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};

            if (head.x < 0 || head.x >= BOARD_SIZE || head.y < 0 || head.y >= BOARD_SIZE || 
                snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.innerText = `SCORE: ${score.toString().padStart(3, '0')}`;
                explosion(head.x, head.y, '#bc13fe'); // Purple explosion
                placeFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function placeFood() {
            let newFood;
            while (true) {
                newFood = {
                    x: Math.floor(Math.random() * BOARD_SIZE),
                    y: Math.floor(Math.random() * BOARD_SIZE)
                };
                if (!snake.some(segment => segment.x === newFood.x && segment.y === newFood.y)) {
                    break;
                }
            }
            food = newFood;
            
            // Spawn effect
            explosion(food.x, food.y, '#fff');
        }

        function gameOver() {
            isGameRunning = false;
            clearInterval(gameLoop);
            // Flash screen red
            document.body.style.backgroundColor = '#300';
            setTimeout(() => document.body.style.backgroundColor = '', 100);
            
            setTimeout(() => {
                alert(`SYSTEM FAILURE\nFINAL SCORE: ${score}`);
                resetGame();
            }, 200);
        }

        function resetGame() {
            snake = [{x: 10, y: 10}, {x: 10, y: 11}, {x: 10, y: 12}];
            direction = {x: 0, y: -1};
            nextDirection = {x: 0, y: -1};
            score = 0;
            scoreElement.innerText = 'SCORE: 000';
            placeFood();
            draw();
            isGameRunning = false;
            startOverlay();
        }

        function startOverlay() {
            if(isGameRunning) return;
            // Simple prompt to start
            const existingOverlay = document.getElementById('start-overlay');
            if(existingOverlay) existingOverlay.remove();
            
            const overlay = document.createElement('div');
            overlay.id = 'start-overlay';
            overlay.style = 'position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); color:#fff; background:rgba(0,0,0,0.8); padding:20px; text-align:center; border:1px solid #00f3ff; cursor:pointer; z-index:100;';
            overlay.innerHTML = 'TAP TO START<br><small>Ready Player One?</small>';
            overlay.onclick = () => {
                overlay.remove();
                startGame();
            };
            document.body.appendChild(overlay);
        }

        function startGame() {
            if (!isGameRunning) {
                isGameRunning = true;
                gameLoop = setInterval(update, INITIAL_SPEED);
            }
        }

        function changeDirection(dir) {
            const goingUp = direction.y === -1;
            const goingDown = direction.y === 1;
            const goingRight = direction.x === 1;
            const goingLeft = direction.x === -1;

            switch(dir) {
                case 'up': if (!goingDown) nextDirection = {x: 0, y: -1}; break;
                case 'down': if (!goingUp) nextDirection = {x: 0, y: 1}; break;
                case 'left': if (!goingRight) nextDirection = {x: -1, y: 0}; break;
                case 'right': if (!goingLeft) nextDirection = {x: 1, y: 0}; break;
            }
        }

        window.addEventListener('keydown', e => {
            if(!isGameRunning && document.getElementById('start-overlay')) {
                document.getElementById('start-overlay').click();
                return;
            }
            switch (e.key) {
                case 'ArrowUp': changeDirection('up'); break;
                case 'ArrowDown': changeDirection('down'); break;
                case 'ArrowLeft': changeDirection('left'); break;
                case 'ArrowRight': changeDirection('right'); break;
            }
        });

        // Touch handling
        let touchStartX = 0;
        let touchStartY = 0;
        
        board.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
            e.preventDefault();
        }, {passive: false});

        board.addEventListener('touchend', e => {
            const touchEndX = e.changedTouches[0].screenX;
            const touchEndY = e.changedTouches[0].screenY;
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                if (Math.abs(dx) > 30) changeDirection(dx > 0 ? 'right' : 'left');
            } else {
                if (Math.abs(dy) > 30) changeDirection(dy > 0 ? 'down' : 'up');
            }
            e.preventDefault();
        }, {passive: false});

        // Init
        resetGame();
    </script>
</body>
</html>
