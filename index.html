<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇大作战 - OpenClaw版</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ecf0f1;
            touch-action: none; /* Prevent zooming on mobile */
        }
        
        h1 {
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        #game-board {
            position: relative;
            background-color: #34495e;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border-radius: 4px;
        }

        .pixel {
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 2px;
            transition: all 0.1s;
        }

        .snake-body {
            background-color: #2ecc71;
            border: 1px solid #27ae60;
            z-index: 2;
        }

        .snake-head {
            background-color: #27ae60;
            border: 1px solid #2ecc71;
            z-index: 3;
            border-radius: 4px;
        }

        .food {
            background-color: #e74c3c;
            border-radius: 50%;
            box-shadow: 0 0 10px #e74c3c;
            z-index: 1;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        #score-board {
            margin-top: 15px;
            font-size: 24px;
            font-weight: bold;
        }

        #controls {
            margin-top: 20px;
            display: none; /* Hidden on desktop by default */
        }
        
        .btn {
            background: #3498db;
            border: none;
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 20px;
            margin: 5px;
            box-shadow: 0 4px 0 #2980b9;
            active: translateY(4px);
        }

        .btn:active {
            box-shadow: none;
            transform: translateY(4px);
        }

        /* Mobile controls layout */
        @media (max-width: 600px) {
            #controls {
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                gap: 5px;
            }
            .btn-up { grid-column: 2; }
            .btn-left { grid-column: 1; grid-row: 2; }
            .btn-down { grid-column: 2; grid-row: 2; }
            .btn-right { grid-column: 3; grid-row: 2; }
        }
    </style>
</head>
<body>

    <h1>贪吃蛇</h1>
    <div id="game-board"></div>
    <div id="score-board">分数: 0</div>
    
    <div id="controls">
        <div></div>
        <button class="btn btn-up" onclick="changeDirection('up')">⬆️</button>
        <div></div>
        <button class="btn btn-left" onclick="changeDirection('left')">⬅️</button>
        <button class="btn btn-down" onclick="changeDirection('down')">⬇️</button>
        <button class="btn btn-right" onclick="changeDirection('right')">➡️</button>
    </div>

    <script>
        // Game Configuration
        const BOARD_SIZE = 20; // 20x20 grid
        const PIXEL_SIZE = 20; // 20px pixels
        const INITIAL_SPEED = 150;
        
        // Game State
        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let direction = {x: 0, y: 0}; // Start stationary
        let nextDirection = {x: 0, y: 0};
        let score = 0;
        let gameLoop;
        let isGameRunning = false;

        const board = document.getElementById('game-board');
        const scoreElement = document.getElementById('score-board');

        // Initialize Board
        board.style.width = `${BOARD_SIZE * PIXEL_SIZE}px`;
        board.style.height = `${BOARD_SIZE * PIXEL_SIZE}px`;

        function draw() {
            board.innerHTML = ''; // Clear board

            // Draw Snake
            snake.forEach((segment, index) => {
                const pixel = document.createElement('div');
                pixel.style.left = `${segment.x * PIXEL_SIZE}px`;
                pixel.style.top = `${segment.y * PIXEL_SIZE}px`;
                pixel.classList.add('pixel');
                pixel.classList.add(index === 0 ? 'snake-head' : 'snake-body');
                board.appendChild(pixel);
            });

            // Draw Food
            const foodPixel = document.createElement('div');
            foodPixel.style.left = `${food.x * PIXEL_SIZE}px`;
            foodPixel.style.top = `${food.y * PIXEL_SIZE}px`;
            foodPixel.classList.add('pixel', 'food');
            board.appendChild(foodPixel);
        }

        function update() {
            if (!isGameRunning) return;

            // Update direction
            direction = nextDirection;

            // Move Head
            const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};

            // Check Collisions (Walls)
            if (head.x < 0 || head.x >= BOARD_SIZE || head.y < 0 || head.y >= BOARD_SIZE) {
                gameOver();
                return;
            }

            // Check Collisions (Self)
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head); // Add new head

            // Check Food
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.innerText = `分数: ${score}`;
                placeFood();
                // Slight speed up could go here
            } else {
                snake.pop(); // Remove tail
            }

            draw();
        }

        function placeFood() {
            let newFood;
            while (true) {
                newFood = {
                    x: Math.floor(Math.random() * BOARD_SIZE),
                    y: Math.floor(Math.random() * BOARD_SIZE)
                };
                // Ensure food doesn't spawn on snake
                if (!snake.some(segment => segment.x === newFood.x && segment.y === newFood.y)) {
                    break;
                }
            }
            food = newFood;
        }

        function gameOver() {
            isGameRunning = false;
            clearInterval(gameLoop);
            alert(`游戏结束！得分: ${score}\n点击确定重新开始`);
            resetGame();
        }

        function resetGame() {
            snake = [{x: 10, y: 10}];
            direction = {x: 0, y: 0};
            nextDirection = {x: 0, y: 0};
            score = 0;
            scoreElement.innerText = '分数: 0';
            placeFood();
            draw();
            isGameRunning = false;
            // Wait for input to start
        }

        function startGame() {
            if (!isGameRunning) {
                isGameRunning = true;
                gameLoop = setInterval(update, INITIAL_SPEED);
            }
        }

        function changeDirection(dir) {
            if (!isGameRunning && (dir === 'up' || dir === 'down' || dir === 'left' || dir === 'right')) {
                startGame();
            }

            const goingUp = direction.y === -1;
            const goingDown = direction.y === 1;
            const goingRight = direction.x === 1;
            const goingLeft = direction.x === -1;

            switch(dir) {
                case 'up':
                    if (!goingDown) nextDirection = {x: 0, y: -1};
                    break;
                case 'down':
                    if (!goingUp) nextDirection = {x: 0, y: 1};
                    break;
                case 'left':
                    if (!goingRight) nextDirection = {x: -1, y: 0};
                    break;
                case 'right':
                    if (!goingLeft) nextDirection = {x: 1, y: 0};
                    break;
            }
        }

        // Keyboard Controls
        window.addEventListener('keydown', e => {
            switch (e.key) {
                case 'ArrowUp': changeDirection('up'); break;
                case 'ArrowDown': changeDirection('down'); break;
                case 'ArrowLeft': changeDirection('left'); break;
                case 'ArrowRight': changeDirection('right'); break;
            }
        });

        // Touch Controls (Simple Swipe)
        let touchStartX = 0;
        let touchStartY = 0;
        
        board.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
            // Prevent default touch actions (scrolling) on the game board
            if (e.target === board || board.contains(e.target)) {
                 e.preventDefault();
            }
        }, {passive: false});

        board.addEventListener('touchend', e => {
            const touchEndX = e.changedTouches[0].screenX;
            const touchEndY = e.changedTouches[0].screenY;
            
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                if (Math.abs(dx) > 30) { // Minimum swipe distance
                    changeDirection(dx > 0 ? 'right' : 'left');
                }
            } else {
                if (Math.abs(dy) > 30) {
                     changeDirection(dy > 0 ? 'down' : 'up');
                }
            }
            // Prevent default behavior
             if (e.target === board || board.contains(e.target)) {
                 e.preventDefault();
            }
        }, {passive: false});

        // Initial Draw
        draw();
    </script>
</body>
</html>
